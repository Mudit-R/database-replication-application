# =============================================================================
# orders.yml — Order schema mappings
# =============================================================================

envelope:
  operation-path: "header.action"

target-schemas:

  # Schema 1: Orders — one row per message (top-level order fields)
  - table-name: "orders"
    userkey-path: "header.uuid"
    filter-topic: "nosql-orders"
    filter-path:  "header.type"
    filter-value: "order"
    required-paths:
      - "header.uuid"
      - "customer_name"
      - "total_amount"
    order_id:
      path: "header.uuid"
    customer_name:
      path: "customer_name"
    total_amount:
      path: "total_amount"
    status:
      path: "status"

  # Schema 2: Order items — Uses item_code as Primary Key
  - table-name: "order_items"
    userkey-path: "item_code"          # ← Primary Key path for item-level updates
    filter-topic: "nosql-orders"
    filter-path:  "header.type"
    filter-value: "order"
    source-array: "items"
    required-paths:
      - "header.uuid"
      - "items"
    item_id:
      path: "item_code"
    order_id:
      path: "header.uuid"
    sku:
      path: "sku"
    qty:
      path: "qty"
    price:
      path: "price"
    color:
      path: "color"
