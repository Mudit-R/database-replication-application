# =============================================================================
# payments.yml — Payment schema mapping
# =============================================================================

envelope:
  operation-path: "header.action"

target-schemas:
  - table-name: "payments"
    userkey-path: "header.uuid"
    filter-topic: "nosql-payments"
    filter-path:  "header.type"
    filter-value: "payment"
    required-paths:
      - "header.uuid"
      - "amount"
    payment_id:
      path: "header.uuid"
    order_ref:
      path: "order_id"
    amount:
      path: "amount"
    method:
      path: "payment_method"
    status:
      path: "status"
