spring:
  application:
    name: replication-engine

  # ── Source NoSQL database (MongoDB/other) connection would go here ──────────
  # nosql:
  #   uri: mongodb://localhost:27017/source_db

  # ── Target relational database ───────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/replication_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── Kafka broker ─────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092

# ── Kafka consumer settings ───────────────────────────────────────────────────
app:
  kafka:
    group-id: replication-consumer-group
    concurrency: 3

  # ── Dynamic mapping directory ─────────────────────────────────────────────────
  # Drop any *.yml schema file here and it will be loaded automatically.
  # No changes to this file or any Java code required for new domains.
  mapping-dir: "./mappings"

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.replication: INFO
    org.springframework.jdbc: DEBUG
