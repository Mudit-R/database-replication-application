spring:
  application:
    name: replication-engine

  # ── Source NoSQL database (MongoDB/other) connection would go here ──────────
  # nosql:
  #   uri: mongodb://localhost:27017/source_db

  # ── Target relational database ───────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/replication_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── Kafka broker ─────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092

  # ── Load the schema mapping file separately ───────────────────────────────────
  config:
    import: "classpath:mapping.yml"

# ── Kafka consumer settings ───────────────────────────────────────────────────
app:
  kafka:
    topics: "nosql-replication,nosql-orders"
    group-id: replication-consumer-group
    concurrency: 3

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.replication: INFO
    org.springframework.jdbc: DEBUG
