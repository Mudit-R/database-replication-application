spring:
  application:
    name: replication-engine

  datasource:
    url: jdbc:mysql://localhost:3306/replication_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  kafka:
    bootstrap-servers: localhost:9092

app:
  kafka:
    topic: nosql-replication
    group-id: replication-consumer-group
    concurrency: 3

  replication:
    envelope:
      operation-path: "header.action"

    # Each entry in target-schemas is an independent table mapping.
    # A single incoming Kafka message is applied to ALL entries whose filter
    # matches (or that have no filter at all).
    #
    # Optional per-schema fields:
    #   filter-path  - dot-separated path into the JSON message
    #   filter-value - the schema is only applied when the message value at
    #                  filter-path equals this string (case-insensitive).
    #                  If both are absent the schema is always applied.
    target-schemas:

      # Schema 1: invoice records table — always applied (no filter).
      - table-name: "db_invoices"
        userkey-path: "header.uuid"
        invoice_id:
          path: "header.uuid"
        invoiceamount:
          path: "invoice_amount"
        vendor_name:
          path: "vendor"
        paid_paise:
          path: "paid"
        order_for:
          path: "For_order"
        column1:
          path: "child.for_order"
        addr_city:
          path: "child.address.city"
        addr_state:
          path: "child.address.state"
        addr_district:
          path: "child.address.district"

      # Schema 2: audit log table — always applied (no filter).
      - table-name: "db_audit_log"
        userkey-path: "header.uuid"
        log_id:
          path: "header.uuid"
        action:
          path: "header.action"
        amount:
          path: "invoice_amount"
        created_by:
          path: "vendor"

      # Schema 3: enterprise vendor summary — applied ONLY when the message
      # contains vendor_type = "enterprise". Regular invoices are skipped here.
      - table-name: "db_vendor_summary"
        userkey-path: "header.uuid"
        filter-path: "vendor_type"
        filter-value: "enterprise"
        summary_id:
          path: "header.uuid"
        vendor_name:
          path: "vendor"
        vendor_type:
          path: "vendor_type"
        total_amount:
          path: "invoice_amount"
        region:
          path: "child.address.city"

logging:
  level:
    com.replication: INFO
    org.springframework.jdbc: DEBUG

# Sample input JSON (enterprise vendor — hits Schema 1 + Schema 3, skips Schema 2):
# {
#   "header": { "uuid": "INV-ENT-001", "action": "insert" },
#   "invoice_amount": 95000.00,
#   "vendor": "Tata Consultancy Services",
#   "vendor_type": "enterprise",
#   "paid": true,
#   "For_order": "ORD-E-001",
#   "child": {
#     "for_order": "SUB-E-001",
#     "address": { "city": "Mumbai", "state": "Maharashtra" }
#   }
# }
#
# This message produces SQL for Schema 1 (db_invoices) and Schema 3 (db_vendor_summary).
# Schema 2 (db_audit_log) is SKIPPED because filter-path/filter-value is not present on it.
# Wait — actually Schema 2 has no filter so it is always applied.
# Schema 3 IS applied because vendor_type == "enterprise".
#
# To skip Schema 3 send a message without vendor_type or with vendor_type != "enterprise".
