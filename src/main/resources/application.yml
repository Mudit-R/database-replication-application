spring:
  application:
    name: replication-engine

  datasource:
    url: jdbc:mysql://localhost:3306/replication_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  kafka:
    bootstrap-servers: localhost:9092

app:
  kafka:
    topic: nosql-replication
    group-id: replication-consumer-group
    concurrency: 3

  replication:
    envelope:
      set-path: "header.tableName" #not being used for the sql generation currently
      userkey-path: "header.uuid"
      operation-path: "header.action"

    target-schema:
      table-name: "db_invoices"
      invoice_id:
        path: "header.uuid"
      invoiceamount:
        path: "invoice_amount"
      vendor_name:
        path: "vendor"
      paid_paise:
        path: "paid"
      order_for:
        path: "For_order"
      column1:
        path: "child.for_order"
      addr_city:
        path: "child.address.city"
      addr_state:
        path: "child.address.state"
      addr_district:
        path: "child.address.district"

logging:
  level:
    com.replication: INFO
    org.springframework.jdbc: DEBUG

