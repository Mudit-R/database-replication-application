spring:
  application:
    name: replication-engine

  datasource:
    url: jdbc:mysql://localhost:3306/replication_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  kafka:
    bootstrap-servers: localhost:9092

app:
  kafka:
    topic: nosql-replication
    group-id: replication-consumer-group
    concurrency: 3

  replication:
    envelope:
      operation-path: "header.action"

    # Each entry in target-schemas is an independent table mapping.
    # A message is applied to a schema when:
    #   - the schema has no filter (always applied), OR
    #   - the message value at filter-path equals filter-value
    #
    # source-array (optional): dot-path to a JSON array inside the message.
    #   If set, the schema is applied once PER ELEMENT in that array.
    #   Column paths resolve from each element first, then fall back to the
    #   top-level message.
    #
    # pk-source: "generated" (optional, per column): auto-generates the primary
    #   key as <parent_uuid>-<array_index> (e.g. ORD-001-0, ORD-001-1).
    target-schemas:

      # -----------------------------------------------------------------------
      # INVOICE SCHEMAS (header.type = invoice, or no type field)
      # -----------------------------------------------------------------------

      # Schema 1: main invoice table — one row per message
      - table-name: "db_invoices"
        userkey-path: "header.uuid"
        filter-path: "header.type"
        filter-value: "invoice"
        invoice_id:
          path: "header.uuid"
        invoiceamount:
          path: "invoice_amount"
        vendor_name:
          path: "vendor"
        paid_paise:
          path: "paid"
        order_for:
          path: "For_order"
        column1:
          path: "child.for_order"
        addr_city:
          path: "child.address.city"
        addr_state:
          path: "child.address.state"
        addr_district:
          path: "child.address.district"

      # Schema 2: audit log — one row per invoice message
      - table-name: "db_audit_log"
        userkey-path: "header.uuid"
        filter-path: "header.type"
        filter-value: "invoice"
        log_id:
          path: "header.uuid"
        action:
          path: "header.action"
        amount:
          path: "invoice_amount"
        created_by:
          path: "vendor"

      # -----------------------------------------------------------------------
      # ORDER SCHEMAS (header.type = order)
      # One incoming order message fans out to THREE tables simultaneously.
      # -----------------------------------------------------------------------

      # Schema 3: orders — one row per message (top-level order fields)
      - table-name: "orders"
        userkey-path: "header.uuid"
        filter-path: "header.type"
        filter-value: "order"
        order_id:
          path: "header.uuid"
        customer_name:
          path: "customer_name"
        total_amount:
          path: "total_amount"
        status:
          path: "status"

      # Schema 4: order_items — ONE ROW PER ELEMENT in the items array
      #   source-array tells the engine to iterate items[].
      #   item_id is auto-generated as <order_id>-<index> (e.g. ORD-001-0).
      #   order_id falls back to top-level header.uuid because it is not
      #   present on the array element itself.
      - table-name: "order_items"
        userkey-path: "header.uuid"
        filter-path: "header.type"
        filter-value: "order"
        source-array: "items"
        item_id:
          path: "header.uuid"
          pk-source: "generated"
        order_id:
          path: "header.uuid"
        sku:
          path: "sku"
        qty:
          path: "qty"
        price:
          path: "price"

      # Schema 5: order_audit — lightweight log, one row per order message
      - table-name: "order_audit"
        userkey-path: "header.uuid"
        filter-path: "header.type"
        filter-value: "order"
        log_id:
          path: "header.uuid"
        action:
          path: "header.action"
        written_by:
          path: "customer_name"
        item_count:
          path: "total_items"

logging:
  level:
    com.replication: INFO
    org.springframework.jdbc: DEBUG
